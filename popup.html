<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AskAI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>AskAI</h1>
    <p class="subtitle">Ask ChatGPT, Gemini &amp; Claude at once</p>

    <div class="services">
      <label><input type="checkbox" id="cb-chatgpt" checked> ChatGPT</label>
      <label><input type="checkbox" id="cb-gemini" checked> Gemini</label>
      <label><input type="checkbox" id="cb-claude" checked> Claude</label>
    </div>

    <textarea id="question" placeholder="Type your question..." rows="4"></textarea>
    <button id="ask-btn">Ask All</button>
    <p id="status" class="status"></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
